<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task manager - Удаление задачи</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="d-flex flex-column min-vh-100">
    <!-- Навигационная панель (скопируйте из других файлов) -->
    <nav class="navbar navbar-expand-lg navbar-light bg-light ms-3">
        <!-- ... тот же навбар что в других файлах ... -->
    </nav>

    <div class="container wrapper flex-grow-1 mt-4">
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                </div>
            {% endfor %}
        {% endif %}

        <div class="card">
            <div class="card-header bg-danger text-white">
                <h2 class="mb-0">Удаление задачи</h2>
            </div>
            <div class="card-body">
                <p class="fs-5">Вы уверены, что хотите удалить задачу <strong>{{ task.name }}</strong>?</p>
                <p class="text-muted">Это действие невозможно отменить.</p>

                <form method="post" class="mt-4">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Да, удалить</button>
                    <a href="{% url 'tasks' %}" class="btn btn-secondary">Отмена</a>
                </form>
            </div>
        </div>
    </div>

    <footer class="footer mt-auto py-3 bg-light">
        <div class="container my-5 pt-4 border-top">
            <a target="_blank" href="https://github.com/KlyaksaOFF">Github</a>
        </div>
    </footer>
</body>
</html>
