<!DOCTYPE html>
<html lang="en-en"><head>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Task manager</title>
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" rel="stylesheet">
    <script crossorigin="anonymous" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-light bg-light ms-3">
      <a class="navbar-brand" href="/">Task manager</a>
      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarToggleExternalContent">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarToggleExternalContent">
        <ul class="navbar-nav mr-auto">
          <li class="nav-item">
            <a class="nav-link" href="/users/">Users</a>
          </li>

        </ul>
        <ul class="navbar-nav">
            {% if user.is_authenticated %}
            <li class="nav-item">
              <a class="nav-link" href="/statuses/">Statuses</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/labels/">Labels</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/tasks/">Tasks</a>
            </li>
                <form method="post" action="{% url 'logout' %}" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn nav-link" style="border: none; background: none;">Logout</button>
                </form>
            </li>
            {% else %}
            <li class="nav-item">
              <a class="nav-link" href="/login/">Login</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/users/create/">Registration</a>
            </li>
            {% endif %}
        </ul>
      </div>
    </nav>
    <div class="container wrapper flex-grow-1">



      <h1 class="my-4">

Создать задачу

      </h1>

<form method="post">
    {% csrf_token %}

    <div class="mb-3">
        <label class="form-label" for="id_name">Имя</label>
        <input type="text" name="name" maxlength="150" class="form-control" placeholder="Имя" required id="id_name">
    </div>

    <div class="mb-3">
        <label class="form-label" for="id_description">Описание</label>
        <textarea name="description" cols="40" rows="10" class="form-control" placeholder="Описание" id="id_description"></textarea>
    </div>

    <div class="mb-3">
        <label class="form-label" for="id_status">Статус</label>
        <select name="status" class="form-select" required id="id_status">
            <option value="" selected>---------</option>
            {% for status in statuses %}
                <option value="{{ status.id }}">{{ status.name }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label" for="id_executor">Исполнитель</label>
        <select name="executor" class="form-select" id="id_executor">
            <option value="" selected>---------</option>
            {% for user in users %}
                <option value="{{ user.id }}">{{ user.get_full_name|default:user.username }}</option>
            {% endfor %}
        </select>
    </div>

    <div class="mb-3">
        <label class="form-label" for="id_labels">Метки</label>
        <select name="labels" class="form-select" id="id_labels" multiple>
            {% for label in labels %}
                <option value="{{ label.id }}">{{ label.name }}</option>
            {% endfor %}
        </select>
        <small class="form-text text-muted">Для выбора нескольких меток удерживайте Ctrl</small>
    </div>

    <input class="btn btn-primary" type="submit" value="Создать">
</form>

    </div>
    <footer>
      <div class="container my-5 pt-4 border-top">
        <a target="_blank" href="https://github.com/KlyaksaOFF">Github</a>
      </div>
    </footer>


</body></html>
