<!DOCTYPE html>
<html lang="en-en"><head>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Task manager</title>
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" rel="stylesheet">
    <script crossorigin="anonymous" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-light bg-light ms-3">
      <a class="navbar-brand" href="/">Task manager</a>
      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarToggleExternalContent">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarToggleExternalContent">
        <ul class="navbar-nav mr-auto">
          <li class="nav-item">
            <a class="nav-link" href="/users/">Пользователи</a>
          </li>

        </ul>
        <ul class="navbar-nav">
            {% if user.is_authenticated %}
            <li class="nav-item">
              <a class="nav-link" href="/statuses/">Статусы</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/labels/">Метки</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/tasks/">Задачи</a>
            </li>
                <form method="post" action="{% url 'logout' %}" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn nav-link" style="border: none; background: none;">Выход</button>
                </form>
            </li>
            {% else %}
            <li class="nav-item">
              <a class="nav-link" href="/login/">Вход</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/users/create/">Регистрация</a>
            </li>
            {% endif %}
        </ul>
      </div>
    </nav>
    <div class="container wrapper flex-grow-1">



      <h1 class="my-4">

Update label

      </h1>

<form method="post">
  <input type="hidden" name="csrfmiddlewaretoken" value="y0NaqetIkbvGEACaosEd2JhFSen2sEicND90Eoc6bqiKYlxm3qlvRbkCJf7Hk1uF">
  <div class="mb-3"><label class="form-label" for="id_name">Name</label><input type="text" name="name" value="{{ label.name }}" maxlength="100" class="form-control" placeholder="Name" required="" id="id_name"></div>
    <input class="btn btn-primary" type="submit" value="Change">
</form>


    </div>
    <footer>
      <div class="container my-5 pt-4 border-top">
        <a target="_blank" href="https://github.com/KlyaksaOFF">Github</a>
      </div>
    </footer>


</body></html>
