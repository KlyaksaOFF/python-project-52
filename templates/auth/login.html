<!DOCTYPE html>
<html lang="en-en"><head>
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Task manager</title>
    <link crossorigin="anonymous" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" rel="stylesheet">
    <script crossorigin="anonymous" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body class="d-flex flex-column min-vh-100">
    <nav class="navbar navbar-expand-lg navbar-light bg-light ms-3">
      <a class="navbar-brand" href="/">Task manager</a>
      <button class="navbar-toggler" data-bs-toggle="collapse" data-bs-target="#navbarToggleExternalContent">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarToggleExternalContent">
        <ul class="navbar-nav mr-auto">
          <li class="nav-item">
            <a class="nav-link" href="/users/">Users</a>
          </li>

        </ul>
        <ul class="navbar-nav">
            {% if user.is_authenticated %}
            <li class="nav-item">
              <a class="nav-link" href="/statuses/">Statuses</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/labels/">Labels</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/tasks/">Tasks</a>
            </li>
                <form method="post" action="{% url 'logout' %}" style="display: inline;">
                    {% csrf_token %}
                    <button type="submit" class="btn nav-link" style="border: none; background: none;">Logout</button>
                </form>
            </li>
            {% else %}
            <li class="nav-item">
              <a class="nav-link" href="/login/">Login</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/users/create/">Registration</a>
            </li>
            {% endif %}
        </ul>
      </div>
    </nav>
    <div class="container wrapper flex-grow-1">
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{% if message.tags %}{{ message.tags }}{% else %}info{% endif %} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
            </div>
        {% endfor %}
    {% endif %}



      <h1 class="my-4">

Login

      </h1>

<form method="post">
    {% csrf_token %}
  <input type="hidden" name="csrfmiddlewaretoken" value="ZtUqmQ7y47EmrOlNkrsMPaIwKknvJyPNaJCXIYtTHvlckkLubdGbrrNAJixoTxlr">
  <div class="mb-3"><label class="form-label" for="id_username">username</label><input type="text" name="username" autofocus="" autocapitalize="none" autocomplete="username" maxlength="150" class="form-control" placeholder="username" required="" id="id_username"></div><div class="mb-3"><label class="form-label" for="id_password">password</label><input type="password" name="password" autocomplete="current-password" class="form-control" placeholder="password" required="" id="id_password"></div>
    <input class="btn btn-primary" type="submit" value="Login">
</form>

    </div>
    <footer>
      <div class="container my-5 pt-4 border-top">
        <a target="_blank" href="https://github.com/KlyaksaOFF">Github</a>
      </div>
    </footer>


</body></html>
