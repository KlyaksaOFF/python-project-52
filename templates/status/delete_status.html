<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Delete Status</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <div class="card">
            <div class="card-header">
                <h2>Delete Status</h2>
            </div>
            <div class="card-body">
                <p>Are you sure you want to delete Status <strong>{{ status.name }}</strong>?</p>
                <p>This action cannot be undone.</p>

                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, delete</button>
                    <a href="{% url 'statuses' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
    <footer>
      <div class="container my-5 pt-4 border-top">
        <a target="_blank" href="https://github.com/KlyaksaOFF">Github</a>
      </div>
    </footer>
</body>
</html>
