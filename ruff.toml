

line-length = 80

[lint.per-file-ignores]
  # init modules can contain the local imports, logic, unused imports
"__init__.py" = ["F401"]
"task_manager/migrations/*" = ["F401", "E501"]
"task_manager/settings.py" = ["F401", "E501"]
"task_manager/urls.py" = ["F401", "E501"]
"task_manager/tests/*" = ["F401", "E501", "F841"]
"task_manager/views.py" = ["E722"]

[lint]
preview = true
select = ["E", "F", "I", "C90"]
